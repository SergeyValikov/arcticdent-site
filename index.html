<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="preload"
      as="image"
      href="/images/services/mobile/orthopedia-mobile.png"
      media="(hover: none) and (pointer: coarse)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      ;(function () {
        var root = document.documentElement
        var stableViewportWidth = null

        function setMobileViewportState() {
          var viewport = document.querySelector('meta[name="viewport"]')
          if (viewport) {
            viewport.setAttribute('content', 'width=device-width, initial-scale=1.0')
          }

          var isTouch = navigator.maxTouchPoints > 0 || 'ontouchstart' in window
          var screenWidth = Math.min(screen.width || 9999, screen.height || 9999)
          var layoutViewport = window.innerWidth || root.clientWidth || screenWidth
          var isPinchZoom = window.visualViewport && window.visualViewport.scale && window.visualViewport.scale > 1.01
          var viewportWidth = Math.min(screenWidth, layoutViewport)

          if (isPinchZoom && stableViewportWidth) {
            viewportWidth = stableViewportWidth
          } else {
            stableViewportWidth = viewportWidth
          }

          root.style.setProperty('--real-vw', Math.round(viewportWidth) + 'px')
          root.classList.toggle('real-mobile', isTouch && viewportWidth <= 560)
        }

        setMobileViewportState()
        window.addEventListener('resize', setMobileViewportState, { passive: true })
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setMobileViewportState, { passive: true })
        }
      })()
    </script>
    <title>arcticdent-site</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
